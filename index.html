<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Omkara Terminal — Internal Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brown:   #3f1c0e;
      --orange:  #f16827;
      --cream:   #faf6f2;
      --border:  rgba(63,28,14,0.1);
      --muted:   #8a6a5a;
      --white:   #ffffff;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--brown);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 56px;
      height: 64px;
      background: rgba(250,246,242,0.94);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo { display: flex; align-items: center; gap: 11px; text-decoration: none; }
    .nav-mono { width: 30px; height: auto; flex-shrink: 0; }
    .nav-wordtext { display: flex; flex-direction: column; line-height: 1; gap: 1px; }
    .nav-wordtext .w1 { font-size: .88rem; font-weight: 700; color: var(--brown); letter-spacing: -.2px; }
    .nav-wordtext .w1 em { color: var(--orange); font-style: normal; }
    .nav-wordtext .w2 { font-size: .58rem; font-weight: 800; letter-spacing: 2.5px; text-transform: uppercase; color: var(--orange); }

    .nav-pill {
      font-size: .7rem; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--muted);
      background: rgba(63,28,14,0.06);
      border: 1px solid var(--border);
      padding: 5px 14px; border-radius: 999px;
    }

    /* ── PAGE WRAPPER ── */
    .page { max-width: 960px; margin: 0 auto; padding: 0 32px; }

    /* ── HERO ── */
    .hero {
      padding: 72px 0 56px;
      display: flex; flex-direction: column; align-items: center; text-align: center; gap: 16px;
    }

    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: .68rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      color: var(--orange);
      background: rgba(241,104,39,0.08);
      border: 1px solid rgba(241,104,39,0.2);
      padding: 5px 14px; border-radius: 999px;
    }
    .hero-eyebrow::before {
      content: ''; width: 5px; height: 5px; border-radius: 50%;
      background: var(--orange);
      animation: blink 1.6s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 800; letter-spacing: -1.5px; line-height: 1.1;
      color: var(--brown);
    }
    .hero h1 span { color: var(--orange); }

    .hero-sub {
      font-size: .95rem; color: var(--muted); font-weight: 400; line-height: 1.65;
      max-width: 420px;
    }

    .hero-divider {
      width: 40px; height: 2px;
      background: linear-gradient(90deg, var(--orange), transparent);
      border-radius: 2px; margin-top: 8px;
    }

    /* ── CARDS GRID ── */
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding-bottom: 80px;
    }

    @media (max-width: 680px) {
      nav { padding: 0 20px; }
      .page { padding: 0 20px; }
      .cards { grid-template-columns: 1fr; }
      .hero { padding: 52px 0 40px; }
    }

    /* ── BASE CARD ── */
    .card {
      border-radius: 20px;
      padding: 40px 36px 32px;
      display: flex; flex-direction: column; gap: 0;
      text-decoration: none;
      position: relative; overflow: hidden;
      transition: transform .28s cubic-bezier(.2,.8,.3,1), box-shadow .28s;
      min-height: 300px;
    }
    .card:hover { transform: translateY(-4px); }

    /* ── QUANT CARD (dark) ── */
    .card-quant {
      background: var(--brown);
      box-shadow: 0 2px 20px rgba(63,28,14,0.15);
    }
    .card-quant:hover {
      box-shadow: 0 16px 48px rgba(63,28,14,0.3);
    }
    .card-quant::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 105% -5%, rgba(241,104,39,0.18) 0%, transparent 55%);
      pointer-events: none;
    }

    /* ── BORING CARD (light) ── */
    .card-boring {
      background: var(--white);
      border: 1.5px solid var(--border);
      box-shadow: 0 2px 20px rgba(63,28,14,0.06);
    }
    .card-boring:hover {
      box-shadow: 0 16px 48px rgba(63,28,14,0.12);
      border-color: rgba(63,28,14,0.22);
    }

    /* ── CARD LOGO AREA ── */
    .card-logo {
      flex: 1;
      display: flex; align-items: center;
      padding-bottom: 28px;
    }
    .card-logo svg, .card-logo img {
      max-width: 100%;
      height: auto;
      max-height: 80px;
      width: auto;
      display: block;
    }

    /* ── CARD BADGE ── */
    .card-badge {
      font-size: .65rem; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; padding: 4px 11px; border-radius: 999px;
      display: inline-flex; align-items: center; gap: 5px;
      margin-bottom: 20px; width: fit-content;
    }
    .card-badge::before {
      content: ''; width: 5px; height: 5px; border-radius: 50%;
      background: currentColor; opacity: .7;
    }
    .badge-quant {
      background: rgba(241,104,39,0.15);
      color: #ff9a6c;
      border: 1px solid rgba(241,104,39,0.25);
    }
    .badge-boring {
      background: rgba(63,28,14,0.06);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    /* ── CARD FOOTER ── */
    .card-foot {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .card-boring .card-foot { border-top-color: var(--border); }

    .card-name {
      font-size: .8rem; font-weight: 600; letter-spacing: -.1px;
    }
    .card-quant .card-name { color: rgba(255,255,255,0.45); }
    .card-boring .card-name { color: var(--muted); }

    .card-cta {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .82rem; font-weight: 700;
      padding: 9px 20px; border-radius: 8px;
      transition: all .2s;
    }
    .card-quant .card-cta {
      background: var(--orange); color: var(--white);
    }
    .card-quant:hover .card-cta { background: #ff7a3d; }

    .card-boring .card-cta {
      background: var(--brown); color: var(--white);
    }
    .card-boring:hover .card-cta { background: var(--orange); }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 0;
    }
    .footer-inner {
      max-width: 960px; margin: 0 auto; padding: 0 32px;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    }
    .footer-left { display: flex; align-items: center; gap: 10px; }
    .footer-text { font-size: .76rem; color: var(--muted); }

    @media (max-width: 640px) {
      .footer-inner { flex-direction: column; text-align: center; }
    }
  </style>
</head>
